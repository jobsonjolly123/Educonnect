<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Card Slider</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="nav.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <script defer src="nav.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher</title>
    <link rel="stylesheet" href="student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.0-2/css/all.min.css" integrity="sha256-46r060N2LrChLLb5zowXQ72/iKKNiw/lAmygmHExk/o=" crossorigin="anonymous" />
  </head>
  <body  style="background-image: url(banner.png);  background-size: 100% 100%; background-repeat: no-repeat;">
    <section class="header">
        <nav>
          <!---logo--->
          <a href="index.html"><img src="llb.png"></a>
          <div class="nav-links">
            </div>
            </nav>
            </section>
    
        <div class="container">
            <input type="checkbox" id="check">
            <label for="check" class="open"><i class="fas fa-bars"></i></label>
            <div class="sidebar-wrapper">
                <div class="sidebar">
                    <div class="avatar-wrapper">
                        <label for="check" class="close"><i class="fas fa-times"></i></label>
                       <img class="avatar" src="teacherin.jpeg" alt="avatar">
                       <p class="userName">Arundhati Rai</p>
                    </div>
                    <nav>
                        <ul class="menu">
                            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                            <li><a href="#"><i class="fas fa-download"></i>Attendence</a></li>
                            <li><a href="#"><i class="fas fa-gift"></i>Fees</a></li>
                            <li><a href="#"><i class="fas fa-trophy"></i>Mentoring</a></li>
                            <li><a href="feed.html"><i class="fas fa-cog"></i>Feedback</a></li>
                            <li><a href="#"><i class="fas fa-sign-out-alt"></i> Log Out</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    <div class="slider-container swiper">
      <div class="slider-content">
        <div class="card-wrapper swiper-wrapper">
          <div class="card swiper-slide">
            <div class="image-content">
              <span class="overlay"></span>
              <div class="card-image">
                <img src="attendence.png" class="card-img" alt="" />
              </div>
            </div>
            <div class="card-content">
              <h2 class="name">Attendence</h2>
              <p class="description">
              </p>
              <button class="button">View More</button>
            </div>
          </div>
          <div class="card swiper-slide">
            <div class="image-content">
              <span class="overlay"></span>
              <div class="card-image">
                <img src="feedback.png" class="card-img" alt="" />
              </div>
            </div>
            <div class="card-content">
                <h2 class="name">Feedback</h2>
                <p class="description">
                </p>
                <a href="feed.html"><button class="button">View More</button></a>
              </div>
            </div>
            <div class="card swiper-slide">
              <div class="image-content">
                <span class="overlay"></span>
                <div class="card-image">
                  <img src="fees.png" class="card-img" alt="" />
                </div>
              </div>
              <div class="card-content">
                <h2 class="name">Fees</h2>
                <p class="description">
                </p>
                <button class="button">View More</button>
              </div>
            </div>
            <div class="card swiper-slide">
              <div class="image-content">
                <span class="overlay"></span>
                <div class="card-image">
                  <img src="ment.png" class="card-img" alt="" />
                </div>
              </div>
            <div class="card-content">
              <h2 class="name">Mentoring</h2>
              <p class="description">
              </p>
              <button class="button">View More</button>
            </div>
          </div>
        </div>
      </div>
      <div class="swiper-button-next swiper-navBtn"></div>
      <div class="swiper-button-prev swiper-navBtn"></div>
      <div class="swiper-pagination"></div>
    </div>
    
  </body>
</html>
